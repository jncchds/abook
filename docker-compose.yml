services:
  abook-api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5000:8080"
    environment:
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=abook;Username=abook;Password=abook
      - ASPNETCORE_ENVIRONMENT=Production
      # ── LLM defaults (override the built-in Ollama settings) ──────────────────
      # - LlmDefaults__Provider=Ollama          # Ollama | LMStudio | OpenAI | AzureOpenAI | Anthropic
      # - LlmDefaults__ModelName=llama3
      # - LlmDefaults__Endpoint=http://host.docker.internal:11434
      # - LlmDefaults__ApiKey=
      # - LlmDefaults__EmbeddingModelName=nomic-embed-text
      # ── Logging ───────────────────────────────────────────────────────────────
      # - LLM_DEBUG_LOGGING=true                # print full chat history + responses to app log
    depends_on:
      postgres:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: abook
      POSTGRES_USER: abook
      POSTGRES_PASSWORD: abook
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U abook -d abook"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  postgres_data:
